# 10주차 칼로리카운터 nginx reverse proxy 설정
# 학생 본인 Oracle E2.1.Micro 서버에 배치:
#   sudo cp ~/calorie/nginx-calorie.conf /etc/nginx/sites-available/calorie-counter
#   sudo nano /etc/nginx/sites-available/calorie-counter
#   → __STUDENT_ID__ 자리에 본인 ID(aa~zz) 입력 후 저장
#   sudo ln -s /etc/nginx/sites-available/calorie-counter /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# WebSocket Upgrade 매핑 (Gradio queue 필수)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name __STUDENT_ID__-demo.aiweb2026.site;

    # Let's Encrypt ACME challenge가 필요하면 여기로
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 본 서버 — wildcard cert 사용
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __STUDENT_ID__-demo.aiweb2026.site;

    # 강사 배포 wildcard cert (*.aiweb2026.site, 학기 한정 데모용)
    ssl_certificate     /etc/letsencrypt/live/aiweb2026.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiweb2026.site/privkey.pem;

    # 보안 권장 설정
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 음식 사진 업로드 크기 (Gradio 기본 5MB 초과 케이스 대비)
    client_max_body_size 20M;

    # Gradio 컨테이너 (docker-compose의 7860 포트)로 프록시
    location / {
        proxy_pass http://127.0.0.1:7860;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ★ WebSocket 헤더 (Gradio queue 필수, 빠뜨리면 분석 무한 로딩)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 버퍼링 끄기 (실시간 응답)
        proxy_buffering off;
        proxy_redirect  off;

        # HF Inference API 콜드 스타트 대비 (최대 5분)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
